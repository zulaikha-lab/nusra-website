<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; font-family: 'Cinzel', serif; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: #fff;
    }

    /* Background grid of images */
    .background-grid {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      grid-auto-rows: 200px;
      z-index: -1;
    }

    .background-grid img {
      width: 100%; height: 100%;
      object-fit: cover; /* ensures images fill their tile */
    }

    /* Login card */
    .login-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      width: 400px;
      box-shadow: 0 0 25px rgba(106, 63, 191, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.15);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h2 { font-size: 28px; margin-bottom: 30px; color: black; text-shadow: 0 0 8px rgba(255,255,255,0.25); }
    .input-group { margin-bottom: 20px; text-align: left; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: black; }

    input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      outline: none;
      transition: 0.3s;
    }
    input:focus { background: rgba(255, 255, 255, 0.15); box-shadow: 0 0 8px rgba(154, 109, 255, 0.5); }
    input::placeholder { color: rgba(255, 255, 255, 0.6); }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #6a3fbf;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 0 15px rgba(106,63,191,0.5);
    }
    button:hover { background-color: #532f91; transform: translateY(-3px); }

    .footer-links { margin-top: 20px; font-size: 13px; }
    .footer-links a { color: black; text-decoration: none; opacity: 0.8; }
    .footer-links a:hover { opacity: 1; }
  </style>
</head>
<body>
  <!-- Background grid with many images -->
  <div class="background-grid">
    <img src="images/gimbap.jpeg" alt="">
    <img src="images/Burger.jpeg" alt="">
    <img src="images/gepuk.jpeg" alt="">
    <img src="images/kek batik.jpeg" alt="">
    <img src="images/hp.jpeg" alt="">
    <img src="images/phone.jpeg" alt="">
    <img src="images/laptop.jpeg" alt="">
    <img src="images/service.jpeg" alt="">
    <img src="images/cloth.jpeg" alt="">
    <img src="images/cloth.jpeg" alt="">
    <img src="images/sunday market.jpeg" alt="">
    <img src="images/paper bag.jpeg" alt="">
    <img src="images/parcel.jpeg" alt="">
    <img src="images/free.jpeg" alt="">
    <img src="images/random.jpeg" alt="">
    <img src="images/Makeup.jpeg" alt="">
    <img src="images/makeup2.jpeg" alt="">
    <img src="images/totebag.jpeg" alt="">
    <img src="images/hijab.jpeg" alt="">
    <img src="images/kurung.jpeg" alt="">
    <img src="images/shirt.jpeg" alt="">
    <img src="images/cargo.jpeg" alt="">
    <img src="images/skirt.jpeg" alt="">
    <img src="images/haircare.jpeg" alt="">
    <img src="images/japanese.jpeg" alt="">
    <img src="images/skincare.jpeg" alt="">
    <img src="images/jbeauty.jpeg" alt="">
    <img src="images/eve.jpeg" alt="">
  </div>

  <!-- Login form -->
  <div class="login-card">
    <h2>Welcome</h2>
    <form action="/login" method="POST">
      <div class="input-group">
        <label>Username</label>
        <input type="text" placeholder="Enter your username" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>
      <button type="submit">Sign In</button>
    </form>
    <div class="footer-links">
      <a href="#">Forgot Password?</a> | <a href="#">Create Account</a>
    </div>
    <form onsubmit="loginUser(event)">
  <input type="text" id="username" placeholder="Username" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit">Login</button>
</form>
  </div>

  <script>
function loginUser(e) {
  e.preventDefault();

  const username = document.getElementById("username").value;

  // SIMPAN USER (fake database)
  localStorage.setItem("user", username);

  // pergi homepage
  window.location.href = "index.html";
}
</script>

</body>
</html>
